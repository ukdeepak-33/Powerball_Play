<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerball Same Last Digit Analysis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }
        .header h1 {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .header p {
            font-size: 1.2em;
            margin: 10px 0 0 0;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        .controls {
            padding: 25px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-bottom: 2px solid #dee2e6;
        }
        .year-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .tab.active {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,123,255,0.3);
        }
        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .download-btn {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-left: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(40,167,69,0.3);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(40,167,69,0.4);
        }
        .content {
            padding: 25px;
        }
        .month-section {
            margin-bottom: 35px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .month-header {
            background: linear-gradient(135deg, #343a40 0%, #23272b 100%);
            color: white;
            padding: 20px 25px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .month-count {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: normal;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            background: linear-gradient(135deg, #495057 0%, #343a40 100%);
            color: white;
            padding: 15px 10px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }
        td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
        tr:hover {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            transform: scale(1.001);
            transition: all 0.2s ease;
        }
        .numbers {
            font-weight: bold;
            color: #007bff;
            padding: 4px 8px;
            background: rgba(0,123,255,0.1);
            border-radius: 15px;
            margin: 2px;
            display: inline-block;
        }
        .powerball {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(220,53,69,0.3);
        }
        .matches {
            font-weight: bold;
            color: #28a745;
            text-align: left;
            padding-left: 15px;
        }
        .match-highlight {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            margin: 1px;
            display: inline-block;
            font-size: 12px;
        }
        .no-data {
            text-align: center;
            padding: 50px;
            color: #6c757d;
            font-style: italic;
            background: white;
            font-size: 18px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #007bff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            color: #6c757d;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .yearly-summary {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #2196f3;
        }
        .summary-title {
            font-size: 18px;
            font-weight: bold;
            color: #1976d2;
            margin-bottom: 15px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .summary-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .summary-month {
            font-weight: bold;
            color: #1976d2;
            margin-bottom: 5px;
        }
        .summary-count {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
        @media (max-width: 768px) {
            .year-tabs {
                justify-content: center;
            }
            .tab {
                padding: 10px 15px;
                font-size: 14px;
            }
            .download-btn {
                margin-top: 10px;
                margin-left: 0;
                width: 100%;
            }
            .month-header {
                flex-direction: column;
                gap: 10px;
            }
            table {
                font-size: 14px;
            }
            th, td {
                padding: 8px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Powerball Same Last Digit Analysis</h1>
            <p>Find patterns where multiple numbers share the same last digit</p>
        </div>
        
        <div class="controls">
            <div class="year-tabs" id="year-tabs-container">
                <!-- Tabs generated dynamically from DB data -->
            </div>
            <button class="download-btn" onclick="downloadExcel()">📊 Download Complete Excel Report</button>
        </div>
        
        <div class="content">
            <div class="stats" id="stats">
                <!-- Stats will be populated by JavaScript -->
            </div>
            
            <div class="yearly-summary" id="yearly-summary">
                <!-- Yearly summary will be populated by JavaScript -->
            </div>
            
            <div id="data-container">
                <!-- Data will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Data loaded from Supabase via Flask
        const allData = {{ draws_json | safe }};


        // Derive current year and available years from actual data
        const availableYears = [...new Set(allData.map(d => parseInt(d.date.substring(0, 4))))].sort((a, b) => b - a);
        let currentYear = availableYears[0] || new Date().getFullYear();

        function generateYearTabs() {
            const container = document.getElementById('year-tabs-container');
            if (!container) return;
            container.innerHTML = '';
            const years = availableYears;
            years.forEach(year => {
                const button = document.createElement('button');
                button.className = `tab${year === currentYear ? ' active' : ''}`;
                button.textContent = year;
                button.onclick = () => showYear(year);
                container.appendChild(button);
            });
        }
        
        function findSameLastDigitMatches(numbers) {
            const digitGroups = {};
            const matches = [];
            
            // Group numbers by their last digit
            numbers.forEach(num => {
                const lastDigit = num % 10;
                if (!digitGroups[lastDigit]) {
                    digitGroups[lastDigit] = [];
                }
                digitGroups[lastDigit].push(num);
            });
            
            // Find groups with 2 or more numbers
            Object.keys(digitGroups).forEach(digit => {
                if (digitGroups[digit].length >= 2) {
                    matches.push({
                        digit: parseInt(digit),
                        numbers: digitGroups[digit],
                        count: digitGroups[digit].length
                    });
                }
            });
            
            return matches;
        }

        function analyzeYear(year) {
            const yearData = allData.filter(draw => draw.date.startsWith(year.toString()));
            const monthlyData = {};
            
            // Initialize months
            for (let month = 1; month <= 12; month++) {
                monthlyData[month] = [];
            }
            
            yearData.forEach(draw => {
                const month = parseInt(draw.date.split('-')[1]);
                const matches = findSameLastDigitMatches(draw.numbers);
                
                if (matches.length > 0) {
                    monthlyData[month].push({
                        ...draw,
                        matches: matches
                    });
                }
            });
            
            return monthlyData;
        }

        function showYear(year) {
            currentYear = year;
            
            // Update tab styles
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayData(year);
        }

        function displayData(year) {
            const yearData = analyzeYear(year);
            const container = document.getElementById('data-container');
            const statsContainer = document.getElementById('stats');
            const summaryContainer = document.getElementById('yearly-summary');
            
            // Calculate stats
            let totalMatches = 0;
            Object.values(yearData).forEach(monthData => {
                totalMatches += monthData.length;
            });
            
            const allYearDraws = allData.filter(draw => draw.date.startsWith(year.toString())).length;
            const percentage = ((totalMatches / allYearDraws) * 100).toFixed(1);
            
            // Calculate best and worst months
            let bestMonth = 0, bestCount = 0, worstMonth = 12, worstCount = 999;
            Object.entries(yearData).forEach(([month, data]) => {
                if (data.length > bestCount) {
                    bestCount = data.length;
                    bestMonth = month;
                }
                if (data.length < worstCount) {
                    worstCount = data.length;
                    worstMonth = month;
                }
            });
            
            const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalMatches}</div>
                    <div class="stat-label">Total Matches Found in ${year}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${allYearDraws}</div>
                    <div class="stat-label">Total Draws in ${year}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${percentage}%</div>
                    <div class="stat-label">Match Frequency Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${monthNames[bestMonth]} (${bestCount})</div>
                    <div class="stat-label">Best Month for Matches</div>
                </div>
            `;
            
            // Create yearly summary
            summaryContainer.innerHTML = `
                <div class="summary-title">📅 ${year} Monthly Breakdown - Same Last Digit Match Counts</div>
                <div class="summary-grid">
                    ${Object.entries(yearData).map(([month, data]) => `
                        <div class="summary-item">
                            <div class="summary-month">${monthNames[month]}</div>
                            <div class="summary-count">${data.length}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            let html = '';
            
            const fullMonthNames = [
                '', 'January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'
            ];
            
            for (let month = 1; month <= 12; month++) {
                const monthData = yearData[month];
                
                html += `<div class="month-section">
                    <div class="month-header">
                        ${fullMonthNames[month]} ${year}
                        <span class="month-count">${monthData.length} matches found</span>
                    </div>`;
                
                if (monthData.length > 0) {
                    html += `<table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Numbers</th>
                                <th>Powerball</th>
                                <th>Same Last Digit Matches</th>
                                <th>Total Matched Numbers</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    monthData.forEach(draw => {
                        const numbersHtml = draw.numbers.map(num => `<span class="numbers">${num}</span>`).join(' ');
                        const matchesHtml = draw.matches.map(match => 
                            `<span class="match-highlight">Digit ${match.digit}: ${match.numbers.join(', ')}</span>`
                        ).join('<br>');
                        const totalMatchCount = draw.matches.reduce((sum, match) => sum + match.count, 0);
                        
                        html += `<tr>
                            <td><strong>${draw.date}</strong></td>
                            <td>${numbersHtml}</td>
                            <td><span class="powerball">${draw.powerball}</span></td>
                            <td class="matches">${matchesHtml}</td>
                            <td><strong style="color: #28a745; font-size: 18px;">${totalMatchCount}</strong></td>
                        </tr>`;
                    });
                    
                    html += `</tbody></table>`;
                } else {
                    html += `<div class="no-data">No same last digit matches found in ${fullMonthNames[month]} ${year}</div>`;
                }
                
                html += '</div>';
            }
            
            container.innerHTML = html;
        }

        function downloadExcel() {
            const wb = XLSX.utils.book_new();
            
            // Create data for all available years
            const years = availableYears;
            
            years.forEach(year => {
                const yearData = analyzeYear(year);
                const worksheetData = [];
                
                // Add headers
                worksheetData.push(['Date', 'Number 1', 'Number 2', 'Number 3', 'Number 4', 'Number 5', 'Powerball', 'Match Count', 'Same Last Digit Details']);
                
                const monthNames = [
                    '', 'January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'
                ];
                
                for (let month = 1; month <= 12; month++) {
                    const monthData = yearData[month];
                    
                    if (monthData.length > 0) {
                        // Add month separator with count
                        worksheetData.push([`${monthNames[month]} ${year} - ${monthData.length} matches`, '', '', '', '', '', '', '', '']);
                        
                        monthData.forEach(draw => {
                            const matchDetails = draw.matches.map(match => 
                                `Digit ${match.digit}: ${match.numbers.join(', ')}`
                            ).join(' | ');
                            
                            const totalMatches = draw.matches.reduce((sum, match) => sum + match.count, 0);
                            
                            worksheetData.push([
                                draw.date,
                                draw.numbers[0],
                                draw.numbers[1],
                                draw.numbers[2],
                                draw.numbers[3],
                                draw.numbers[4],
                                draw.powerball,
                                totalMatches,
                                matchDetails
                            ]);
                        });
                        
                        // Add empty row after each month
                        worksheetData.push(['', '', '', '', '', '', '', '', '']);
                    }
                }
                
                const ws = XLSX.utils.aoa_to_sheet(worksheetData);
                
                // Set column widths
                ws['!cols'] = [
                    {width: 12}, // Date
                    {width: 10}, // Number 1
                    {width: 10}, // Number 2
                    {width: 10}, // Number 3
                    {width: 10}, // Number 4
                    {width: 10}, // Number 5
                    {width: 10}, // Powerball
                    {width: 12}, // Match Count
                    {width: 60}  // Match Details
                ];
                
                XLSX.utils.book_append_sheet(wb, ws, `${year} Analysis`);
            });
            
            // Add comprehensive summary sheet
            const summaryData = [];
            summaryData.push([`Powerball Same Last Digit Analysis Summary (${minYear}-${maxYear})`, '', '', '', '', '', '']);
            summaryData.push(['Generated on:', new Date().toLocaleDateString(), '', '', '', '', '']);
            summaryData.push(['', '', '', '', '', '', '']);
            
            // Overall statistics
            let grandTotalMatches = 0;
            let grandTotalDraws = 0;
            
            years.forEach(year => {
                const yearData = analyzeYear(year);
                let yearMatches = 0;
                Object.values(yearData).forEach(monthData => {
                    yearMatches += monthData.length;
                });
                const yearDraws = allData.filter(draw => draw.date.startsWith(year.toString())).length;
                
                grandTotalMatches += yearMatches;
                grandTotalDraws += yearDraws;
                
                const yearPercentage = ((yearMatches / yearDraws) * 100).toFixed(1);
                
                summaryData.push([`${year} Statistics:`, '', '', '', '', '', '']);
                summaryData.push(['Total Draws:', yearDraws, '', 'Matches Found:', yearMatches, 'Percentage:', `${yearPercentage}%`]);
                summaryData.push(['', '', '', '', '', '', '']);
                
                // Monthly breakdown for each year
                summaryData.push([`${year} Monthly Breakdown:`, '', '', '', '', '', '']);
                summaryData.push(['Month', 'Matches', 'Month', 'Matches', 'Month', 'Matches', '']);
                
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                for (let i = 0; i < 4; i++) {
                    const month1 = i * 3;
                    const month2 = i * 3 + 1;
                    const month3 = i * 3 + 2;
                    
                    summaryData.push([
                        monthNames[month1] || '', yearData[month1 + 1] ? yearData[month1 + 1].length : 0,
                        monthNames[month2] || '', yearData[month2 + 1] ? yearData[month2 + 1].length : 0,
                        monthNames[month3] || '', yearData[month3 + 1] ? yearData[month3 + 1].length : 0,
                        ''
                    ]);
                }
                
                summaryData.push(['', '', '', '', '', '', '']);
            });
            
            // Grand totals
            const grandPercentage = ((grandTotalMatches / grandTotalDraws) * 100).toFixed(1);
            summaryData.push([`GRAND TOTALS (${minYear}-${maxYear}):`, '', '', '', '', '', '']);
            summaryData.push(['Total Draws Analyzed:', grandTotalDraws, '', '', '', '', '']);
            summaryData.push(['Total Matches Found:', grandTotalMatches, '', '', '', '', '']);
            summaryData.push(['Overall Match Rate:', `${grandPercentage}%`, '', '', '', '', '']);
            summaryData.push(['', '', '', '', '', '', '']);
            
            summaryData.push(['Analysis Notes:', '', '', '', '', '', '']);
            summaryData.push(['- This analysis finds Powerball draws where 2+ main numbers', '', '', '', '', '', '']);
            summaryData.push(['  share the same last digit (e.g., 15, 25, 35)', '', '', '', '', '', '']);
            summaryData.push(['- Only main numbers (1-5) are analyzed, Powerball excluded', '', '', '', '', '', '']);
            summaryData.push([`- Data covers Powerball draws from ${minYear}-${maxYear}`, '', '', '', '', '', '']);
            
            const summaryWs = XLSX.utils.aoa_to_sheet(summaryData);
            XLSX.utils.book_append_sheet(wb, summaryWs, 'Summary');
            
            // Download the Excel file
            const minYear = availableYears[availableYears.length - 1];
            const maxYear = availableYears[0];
            XLSX.writeFile(wb, `Powerball_Same_Last_Digit_Analysis_${minYear}-${maxYear}.xlsx`);
        }

        // Initialize the application
        generateYearTabs();
        displayData(currentYear);
    </script>
</body>
</html>
